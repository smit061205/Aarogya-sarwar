<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HealthAssist Dashboard</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#717783",
                    "surface-container-highest": "#e0e2ea",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed-variant": "#733600",
                    "tertiary-fixed-dim": "#ffb688",
                    "on-secondary-fixed-variant": "#005312",
                    "secondary-fixed": "#9df898",
                    "secondary": "#106d20",
                    "tertiary-container": "#ba5b00",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#ffdbc7",
                    "on-tertiary-fixed": "#311300",
                    "on-tertiary": "#ffffff",
                    "surface": "#f9f9ff",
                    "surface-variant": "#e0e2ea",
                    "on-secondary-fixed": "#002204",
                    "surface-bright": "#f9f9ff",
                    "inverse-surface": "#2d3037",
                    "on-tertiary-container": "#fffeff",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#1a7425",
                    "secondary-fixed-dim": "#82db7e",
                    "on-primary-container": "#fffdff",
                    "primary-container": "#1976d2",
                    "outline-variant": "#c1c6d4",
                    "on-primary-fixed": "#001c3a",
                    "secondary-container": "#9df898",
                    "error": "#ba1a1a",
                    "primary": "#005dac",
                    "on-surface-variant": "#414752",
                    "tertiary": "#944700",
                    "error-container": "#ffdad6",
                    "on-surface": "#181c21",
                    "primary-fixed-dim": "#a5c8ff",
                    "inverse-primary": "#a5c8ff",
                    "surface-container-high": "#e6e8f0",
                    "on-primary-fixed-variant": "#004786",
                    "on-background": "#181c21",
                    "background": "#f9f9ff",
                    "on-error": "#ffffff",
                    "primary-fixed": "#d4e3ff",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#f2f3fc",
                    "inverse-on-surface": "#eff0f9",
                    "surface-tint": "#005faf",
                    "surface-dim": "#d8dae2",
                    "surface-container": "#ecedf6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-max": "1280px",
                    "stack-sm": "12px",
                    "gutter": "24px",
                    "margin-mobile": "16px",
                    "margin-desktop": "40px",
                    "unit": "8px",
                    "stack-md": "24px",
                    "stack-lg": "48px"
            },
            "fontFamily": {
                    "display": [
                            "Public Sans"
                    ],
                    "label-bold": [
                            "Public Sans"
                    ],
                    "h1": [
                            "Public Sans"
                    ],
                    "h2": [
                            "Public Sans"
                    ],
                    "body-md": [
                            "Public Sans"
                    ],
                    "button": [
                            "Public Sans"
                    ],
                    "body-lg": [
                            "Public Sans"
                    ]
            },
            "fontSize": {
                    "display": [
                            "40px",
                            {
                                    "lineHeight": "1.2",
                                    "fontWeight": "700"
                            }
                    ],
                    "label-bold": [
                            "16px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "h1": [
                            "32px",
                            {
                                    "lineHeight": "1.3",
                                    "fontWeight": "700"
                            }
                    ],
                    "h2": [
                            "24px",
                            {
                                    "lineHeight": "1.4",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-md": [
                            "18px",
                            {
                                    "lineHeight": "1.5",
                                    "fontWeight": "400"
                            }
                    ],
                    "button": [
                            "18px",
                            {
                                    "lineHeight": "1",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-lg": [
                            "20px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ]
            }
          }
        }
      }
    </script>
<style>
        /* Base styles ensuring material icons render correctly */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar from JSON -->
<header class="bg-white dark:bg-slate-900 text-blue-700 dark:text-blue-400 font-['Public_Sans'] text-lg font-bold tracking-tight docked full-width top-0 border-b-2 border-slate-100 dark:border-slate-800 shadow-[0_4px_20px_rgba(0,0,0,0.05)] flex justify-between items-center h-[72px] w-full px-6 fixed z-50">
<button aria-label="Go Back" class="flex items-center justify-center p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-95 transition-transform duration-200 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-[28px]" data-icon="arrow_back">arrow_back</span>
</button>
<div class="text-xl font-black text-blue-800 dark:text-blue-300">
            HealthAssist
        </div>
<button aria-label="Profile" class="flex items-center justify-center p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-95 transition-transform duration-200 text-blue-700 dark:text-blue-400 font-bold">
<span class="material-symbols-outlined text-[28px]" data-icon="account_circle" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</button>
</header>
<!-- Main Canvas Content -->
<main class="flex-1 pt-[104px] pb-[136px] px-margin-mobile md:px-margin-desktop max-w-[800px] mx-auto w-full flex flex-col">
<!-- Greeting Section -->
<section class="mb-stack-lg flex items-center justify-between">
<div>
<p class="font-body-md text-body-md text-on-surface-variant mb-unit">Welcome back,</p>
<h1 class="font-h1 text-h1 text-on-surface">Hello, Jenish</h1>
</div>
<!-- Large decorative avatar for Assisted Clarity -->
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.05)] border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-[32px] text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">face</span>
</div>
</section>
<!-- 2-Column Action Grid (Bento Style) -->
<div class="grid grid-cols-2 gap-margin-mobile md:gap-gutter w-full">
<!-- Medications Tile -->
<button class="group bg-surface-container-lowest rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.10)] p-stack-md flex flex-col items-center justify-center text-center aspect-square transition-all duration-200 active:scale-95 border border-transparent hover:border-primary-fixed-dim">
<div class="w-[72px] h-[72px] rounded-full bg-primary-fixed flex items-center justify-center mb-stack-sm group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[40px] text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">medication</span>
</div>
<span class="font-h2 text-h2 text-on-surface">Medications</span>
</button>
<!-- Meal Log Tile -->
<button class="group bg-surface-container-lowest rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.10)] p-stack-md flex flex-col items-center justify-center text-center aspect-square transition-all duration-200 active:scale-95 border border-transparent hover:border-secondary-fixed-dim">
<div class="w-[72px] h-[72px] rounded-full bg-secondary-fixed flex items-center justify-center mb-stack-sm group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[40px] text-on-secondary-fixed" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-h2 text-h2 text-on-surface">Meal Log</span>
</button>
<!-- Support Tile -->
<button class="group bg-surface-container-lowest rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.10)] p-stack-md flex flex-col items-center justify-center text-center aspect-square transition-all duration-200 active:scale-95 border border-transparent hover:border-primary-fixed-dim">
<div class="w-[72px] h-[72px] rounded-full bg-primary-fixed flex items-center justify-center mb-stack-sm group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[40px] text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<span class="font-h2 text-h2 text-on-surface">Support</span>
</button>
<!-- Emergency SOS Tile -->
<button class="group bg-error rounded-2xl shadow-[0_8px_30px_rgba(186,26,26,0.25)] hover:shadow-[0_12px_40px_rgba(186,26,26,0.35)] p-stack-md flex flex-col items-center justify-center text-center aspect-square transition-all duration-200 active:scale-95 relative overflow-hidden border-4 border-error hover:border-error-container">
<div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity duration-300"></div>
<span class="material-symbols-outlined text-[64px] text-on-error mb-unit animate-pulse" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-label-bold text-label-bold text-on-error uppercase tracking-widest mt-unit">Emergency<br/>SOS</span>
</button>
</div>
</main>
<!-- BottomNavBar from JSON (Visible on Mobile) -->
<nav class="md:hidden bg-white dark:bg-slate-900 font-['Public_Sans'] text-[13px] font-bold text-blue-700 dark:text-blue-400 fixed bottom-0 left-0 w-full z-50 border-t-2 border-slate-100 dark:border-slate-800 rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)] flex justify-around items-center h-[96px] px-4 pb-4">
<!-- Active Tab: Home -->
<div class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 rounded-2xl min-h-[64px] min-w-[72px] cursor-pointer active:opacity-80 transition-all">
<span class="material-symbols-outlined text-[28px] mb-1" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span>Home</span>
</div>
<!-- Inactive Tab: Meds -->
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] min-w-[72px] hover:bg-slate-50 dark:hover:bg-slate-800 rounded-2xl cursor-pointer active:opacity-80 transition-all">
<span class="material-symbols-outlined text-[28px] mb-1" data-icon="medication">medication</span>
<span>Meds</span>
</div>
<!-- Inactive Tab: Meals -->
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] min-w-[72px] hover:bg-slate-50 dark:hover:bg-slate-800 rounded-2xl cursor-pointer active:opacity-80 transition-all">
<span class="material-symbols-outlined text-[28px] mb-1" data-icon="restaurant">restaurant</span>
<span>Meals</span>
</div>
<!-- Inactive Tab: Chat -->
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] min-w-[72px] hover:bg-slate-50 dark:hover:bg-slate-800 rounded-2xl cursor-pointer active:opacity-80 transition-all">
<span class="material-symbols-outlined text-[28px] mb-1" data-icon="chat">chat</span>
<span>Chat</span>
</div>
<!-- Inactive Tab: SOS -->
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] min-w-[72px] hover:bg-slate-50 dark:hover:bg-slate-800 rounded-2xl cursor-pointer active:opacity-80 transition-all">
<span class="material-symbols-outlined text-[28px] mb-1 text-error" data-icon="emergency">emergency</span>
<span class="text-error">SOS</span>
</div>
</nav>
</body></html>
