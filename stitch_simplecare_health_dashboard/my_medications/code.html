<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HealthAssist - Medications</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Ensure smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#717783",
                        "surface-container-highest": "#e0e2ea",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#733600",
                        "tertiary-fixed-dim": "#ffb688",
                        "on-secondary-fixed-variant": "#005312",
                        "secondary-fixed": "#9df898",
                        "secondary": "#106d20",
                        "tertiary-container": "#ba5b00",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdbc7",
                        "on-tertiary-fixed": "#311300",
                        "on-tertiary": "#ffffff",
                        "surface": "#f9f9ff",
                        "surface-variant": "#e0e2ea",
                        "on-secondary-fixed": "#002204",
                        "surface-bright": "#f9f9ff",
                        "inverse-surface": "#2d3037",
                        "on-tertiary-container": "#fffeff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#1a7425",
                        "secondary-fixed-dim": "#82db7e",
                        "on-primary-container": "#fffdff",
                        "primary-container": "#1976d2",
                        "outline-variant": "#c1c6d4",
                        "on-primary-fixed": "#001c3a",
                        "secondary-container": "#9df898",
                        "error": "#ba1a1a",
                        "primary": "#005dac",
                        "on-surface-variant": "#414752",
                        "tertiary": "#944700",
                        "error-container": "#ffdad6",
                        "on-surface": "#181c21",
                        "primary-fixed-dim": "#a5c8ff",
                        "inverse-primary": "#a5c8ff",
                        "surface-container-high": "#e6e8f0",
                        "on-primary-fixed-variant": "#004786",
                        "on-background": "#181c21",
                        "background": "#f9f9ff",
                        "on-error": "#ffffff",
                        "primary-fixed": "#d4e3ff",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f2f3fc",
                        "inverse-on-surface": "#eff0f9",
                        "surface-tint": "#005faf",
                        "surface-dim": "#d8dae2",
                        "surface-container": "#ecedf6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "stack-sm": "12px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "unit": "8px",
                        "stack-md": "24px",
                        "stack-lg": "48px"
                    },
                    "fontFamily": {
                        "display": ["Public Sans"],
                        "label-bold": ["Public Sans"],
                        "h1": ["Public Sans"],
                        "h2": ["Public Sans"],
                        "body-md": ["Public Sans"],
                        "button": ["Public Sans"],
                        "body-lg": ["Public Sans"]
                    },
                    "fontSize": {
                        "display": ["40px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-bold": ["16px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "700" }],
                        "h1": ["32px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "h2": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["18px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "button": ["18px", { "lineHeight": "1", "fontWeight": "600" }],
                        "body-lg": ["20px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar JSON Component -->
<header class="bg-white dark:bg-slate-900 font-['Public_Sans'] text-lg font-bold tracking-tight docked full-width top-0 border-b-2 border-slate-100 dark:border-slate-800 shadow-[0_4px_20px_rgba(0,0,0,0.05)] flex justify-between items-center h-[72px] w-full px-6 fixed z-50">
<button class="active:scale-95 transition-transform duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">arrow_back</span>
</button>
<div class="text-xl font-black text-blue-800 dark:text-blue-300">
            HealthAssist
        </div>
<button class="active:scale-95 transition-transform duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">account_circle</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 pt-[88px] pb-[120px] px-margin-mobile md:px-margin-desktop w-full max-w-2xl mx-auto flex flex-col gap-stack-md">
<div class="mb-unit">
<h1 class="font-h1 text-h1 text-on-surface">Today's Schedule</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-1">Please take your medications as prescribed.</p>
</div>
<!-- Medication Card: Morning -->
<article class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/20 p-stack-md flex flex-col gap-stack-sm hover:shadow-[0_8px_30px_rgba(0,0,0,0.10)] transition-shadow">
<div class="flex items-center gap-unit mb-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<span class="font-label-bold text-label-bold text-primary">8:00 AM</span>
</div>
<div class="flex justify-between items-start">
<div>
<h2 class="font-h1 text-h1 text-on-surface">Aspirin</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-1">1 Tablet (81mg)</p>
</div>
<div class="bg-primary-fixed text-on-primary-fixed px-3 py-1 rounded-full font-label-bold text-sm">
                    With Food
                </div>
</div>
<button class="w-full min-h-[56px] mt-4 bg-primary text-on-primary font-button text-button rounded-lg flex justify-center items-center gap-2 hover:bg-on-primary-fixed-variant transition-colors shadow-sm active:scale-[0.98]">
<span class="material-symbols-outlined text-[24px]">check_circle</span>
                Mark as Taken
            </button>
</article>
<!-- Medication Card: Afternoon -->
<article class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/20 p-stack-md flex flex-col gap-stack-sm hover:shadow-[0_8px_30px_rgba(0,0,0,0.10)] transition-shadow">
<div class="flex items-center gap-unit mb-2">
<span class="material-symbols-outlined text-tertiary text-2xl" style="font-variation-settings: 'FILL' 1;">sunny</span>
<span class="font-label-bold text-label-bold text-tertiary">1:00 PM</span>
</div>
<div class="flex justify-between items-start">
<div>
<h2 class="font-h1 text-h1 text-on-surface">Lisinopril</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-1">1 Tablet (10mg)</p>
</div>
</div>
<button class="w-full min-h-[56px] mt-4 bg-primary text-on-primary font-button text-button rounded-lg flex justify-center items-center gap-2 hover:bg-on-primary-fixed-variant transition-colors shadow-sm active:scale-[0.98]">
<span class="material-symbols-outlined text-[24px]">check_circle</span>
                Mark as Taken
            </button>
</article>
<!-- Add Medicine Button Area -->
<div class="mt-stack-lg">
<button class="w-full min-h-[64px] bg-surface-container border-2 border-dashed border-outline font-button text-button text-on-surface-variant rounded-xl flex justify-center items-center gap-3 hover:bg-surface-container-high transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-3xl">add</span>
                Add Medicine
            </button>
</div>
</main>
<!-- BottomNavBar JSON Component -->
<!-- Active state applied to "Meds" based on page intent -->
<nav class="bg-white dark:bg-slate-900 fixed bottom-0 left-0 w-full z-50 border-t-2 rounded-t-2xl border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] flex justify-around items-center h-[96px] px-4 pb-4 md:hidden">
<!-- Home (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] hover:bg-slate-50 dark:hover:bg-slate-800 active:opacity-80 transition-all cursor-pointer w-[72px] rounded-xl">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-['Public_Sans'] text-[13px] font-bold">Home</span>
</button>
<!-- Meds (ACTIVE) -->
<button class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 rounded-2xl min-h-[64px] min-w-[72px] hover:bg-slate-50 dark:hover:bg-slate-800 active:opacity-80 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">medication</span>
<span class="font-['Public_Sans'] text-[13px] font-bold">Meds</span>
</button>
<!-- Meals (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] hover:bg-slate-50 dark:hover:bg-slate-800 active:opacity-80 transition-all cursor-pointer w-[72px] rounded-xl">
<span class="material-symbols-outlined mb-1">restaurant</span>
<span class="font-['Public_Sans'] text-[13px] font-bold">Meals</span>
</button>
<!-- Chat (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] hover:bg-slate-50 dark:hover:bg-slate-800 active:opacity-80 transition-all cursor-pointer w-[72px] rounded-xl">
<span class="material-symbols-outlined mb-1">chat</span>
<span class="font-['Public_Sans'] text-[13px] font-bold">Chat</span>
</button>
<!-- SOS (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 min-h-[64px] hover:bg-slate-50 dark:hover:bg-slate-800 active:opacity-80 transition-all cursor-pointer w-[72px] rounded-xl">
<span class="material-symbols-outlined mb-1">emergency</span>
<span class="font-['Public_Sans'] text-[13px] font-bold text-error">SOS</span>
</button>
</nav>
</body></html>
